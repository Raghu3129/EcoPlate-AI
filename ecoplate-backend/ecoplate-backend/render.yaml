services:
  - type: web
    name: ecoplate-ai-backend
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python -m app.ml.train_model"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        value: sqlite:///./ecoplate.db
    autoDeploy: true
